openapi: 3.0.0
info:
    title: 'Housing Rental API'
    version: 1.0.0
    description: 'API для работы с предложениями, отзывами и пользователями'
servers:
    - {url: 'http://localhost:5000'}
components:
    securitySchemes: {bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}}
    schemas: {User: {type: object, properties: {id: {type: string}, email: {type: string, format: email}, username: {type: string, minLength: 1, maxLength: 15}, avatar: {type: string}, isPro: {type: boolean}, token: {type: string}}}, Offer: {type: object, properties: {id: {type: string}, title: {type: string, minLength: 10, maxLength: 100}, description: {type: string, minLength: 20, maxLength: 1024}, type: {type: string, enum: [apartment, house, room, hotel]}, price: {type: integer, minimum: 100, maximum: 100000}, city: {type: object, properties: {name: {type: string, enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]}, location: {type: object, properties: {latitude: {type: number}, longitude: {type: number}, zoom: {type: integer}}}}}, location: {type: object, properties: {latitude: {type: number}, longitude: {type: number}}}, isFavorite: {type: boolean}, isPremium: {type: boolean}, rating: {type: number, minimum: 1, maximum: 5}, previewImage: {type: string}, photos: {type: array, items: {type: string}}, rooms: {type: integer, minimum: 1, maximum: 8}, guests: {type: integer, minimum: 1, maximum: 10}, features: {type: array, items: {type: string, enum: [Breakfast, 'Air conditioning', 'Laptop friendly workspace', 'Baby seat', Washer, Towels, Fridge]}}, author: {type: object, properties: {id: {type: string}, username: {type: string}, avatarUrl: {type: string}, isPro: {type: boolean}}}}}, Review: {type: object, properties: {id: {type: string}, comment: {type: string, minLength: 5, maxLength: 1024}, rating: {type: integer, minimum: 1, maximum: 5}, date: {type: string, format: date-time}, user: {type: object, properties: {name: {type: string}, avatarUrl: {type: string}, isPro: {type: boolean}}}}}, Error: {type: object, properties: {message: {type: string}}}}
tags:
    - {name: Users, description: 'Операции с пользователями'}
    - {name: Offers, description: 'Операции с предложениями'}
    - {name: Reviews, description: 'Операции с отзывами'}
paths:
    /register: {post: {summary: 'Регистрация нового пользователя', tags: [Users], requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [email, password, username], properties: {email: {type: string, format: email}, password: {type: string, minLength: 6, maxLength: 12}, username: {type: string, minLength: 1, maxLength: 15}, userType: {type: string, enum: [normal, pro]}, avatar: {type: string, format: binary}}}, example: {email: Deion21@yahoo.com, password: uRUJzoVwlt, username: Merl, userType: normal}}}}, responses: {'200': {description: 'Успешная регистрация', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '400': {description: 'Ошибка валидации', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /login: {post: {summary: 'Авторизация пользователя', tags: [Users], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [email, password], properties: {email: {type: string, format: email}, password: {type: string}}}, example: {email: Martha43@hotmail.com, password: 8yJzqWGwrw}}}}, responses: {'200': {description: 'Успешный логин, возвращает токен', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '400': {description: 'Неверные учётные данные', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, get: {summary: 'Проверка авторизации', tags: [Users], security: [{bearerAuth: []}], responses: {'200': {description: 'Пользователь авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /logout: {delete: {summary: 'Выход из системы', tags: [Users], security: [{bearerAuth: []}], responses: {'200': {description: 'Успешный выход', content: {application/json: {schema: {type: object, properties: {message: {type: string}}}}}}}}}
    /offers: {get: {summary: 'Получить список всех предложений', tags: [Offers], responses: {'200': {description: 'Список предложений', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Offer'}}}}}, '500': {description: 'Ошибка сервера', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, post: {summary: 'Создание нового предложения', tags: [Offers], security: [{bearerAuth: []}], requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [title, description, city, price, rooms, guests, previewImage], properties: {title: {type: string, minLength: 10, maxLength: 100}, description: {type: string, minLength: 20, maxLength: 1024}, publishDate: {type: string, format: date}, city: {type: string, enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]}, isPremium: {type: boolean}, isFavorite: {type: boolean}, rating: {type: number, minimum: 1, maximum: 5}, type: {type: string, enum: [apartment, house, room, hotel]}, rooms: {type: integer, minimum: 1, maximum: 8}, guests: {type: integer, minimum: 1, maximum: 10}, price: {type: integer, minimum: 100, maximum: 100000}, features: {type: string, description: 'JSON-строка массива удобств'}, commentsCount: {type: integer}, latitude: {type: number}, longitude: {type: number}, userId: {type: integer}, previewImage: {type: string, format: binary, description: 'Основное изображение (обязательно)'}, photos: {type: array, items: {type: string, format: binary}, description: 'Дополнительные изображения (макс. 6)'}}}, examples: {generated: {summary: 'Сгенерированный пример (только текстовые поля)', value: {title: 'adaugeo blanditiis demens', description: 'Sollicito cultellus stips vita adhuc cavus absum adfero peior ciminatio. Super temporibus auctus utilis pauci crastinus amplexus ad cras. Fuga decumbo autus xiphias averto strues spiculum aperiam ara.', publishDate: '2026-03-10', city: Brussels, isPremium: true, isFavorite: true, rating: 2.6, type: hotel, rooms: 5, guests: 4, price: 472, features: '["Breakfast","Air conditioning","Washer","Towels","Fridge"]', commentsCount: 30, latitude: 49.2089, longitude: 8.3205, userId: 8}}}}}}, responses: {'201': {description: 'Предложение успешно создано', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '400': {description: 'Ошибка валидации данных', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/offers/{id}': {get: {summary: 'Получить полное предложение по ID', tags: [Offers], parameters: [{in: path, name: id, required: true, schema: {type: string}, description: 'ID предложения'}], responses: {'200': {description: 'Информация о предложении', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '404': {description: 'Предложение не найдено', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /favorite: {get: {summary: 'Получить избранные предложения', tags: [Offers], security: [{bearerAuth: []}], responses: {'200': {description: 'Список избранных предложений', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Offer'}}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/favorite/{offerId}/{status}': {post: {summary: 'Добавить/удалить предложение из избранного', tags: [Offers], security: [{bearerAuth: []}], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}, {in: path, name: status, required: true, schema: {type: string, enum: ['0', '1']}, description: '1 - добавить, 0 - удалить'}], responses: {'200': {description: 'Статус обновлён', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}, '404': {description: 'Предложение не найдено', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/comments/{offerId}': {get: {summary: 'Получить отзывы для предложения', tags: [Reviews], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}], responses: {'200': {description: 'Список отзывов', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Review'}}}}}, '500': {description: 'Ошибка сервера', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, post: {summary: 'Добавить отзыв к предложению', tags: [Reviews], security: [{bearerAuth: []}], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [comment, rating], properties: {comment: {type: string, minLength: 5, maxLength: 1024}, rating: {type: integer, minimum: 1, maximum: 5}}}, example: {comment: 'Volutabrum soluta cum ager vos canis casso error. Super cribro thymum ancilla. Tribuo patrocinor vae molestiae votum infit. Tepidus vaco tumultus admoneo vomer deduco quisquam debitis vociferor. Pel solus aperio. Deporto curia sub ullam desidero colo quae cometes. Suscipio auctus dolores vigor turbo eum. Velociter canonicus tabesco minus iste. Volaticus cuppedia triduana adipiscor vesco aegrotatio appono cibo aperiam. Arceo cresco suppellex. Amplus deinde deserunt stabilis. Aperiam accusamus aranea occaecati. Caelestis cito celer certe cresco utrimque conqueror demitto. Hic assumenda solium tubineus aggero. Sumo decipio adicio at abeo charisma. Inventore sperno fugiat cribro saepe aqua cibo abscido. Tactus argentum ager quaerat dolore. Confido adimpleo sint ipsam ex hic dolorum demonstro sto. Credo talus compello tabesco mollitia clementia timor demoror cum appono. Unus vulnus capitulus clarus vesco atrocitas ratione argentum. Uter cito tondeo arceo capitulus perspiciatis tener decor thesaurus. Pectus cubitum celer tibi cuppedia. Impedit crinis pau