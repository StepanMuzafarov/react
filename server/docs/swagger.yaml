openapi: 3.0.0
info:
    title: 'Housing Rental API'
    version: 1.0.0
    description: 'API для работы с предложениями, отзывами и пользователями'
servers:
    - {url: 'http://localhost:5000'}
components:
    securitySchemes: {bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}}
    schemas: {User: {type: object, properties: {id: {type: string}, email: {type: string, format: email}, username: {type: string, minLength: 1, maxLength: 15}, avatar: {type: string}, isPro: {type: boolean}, token: {type: string}}}, Offer: {type: object, properties: {id: {type: string}, title: {type: string, minLength: 10, maxLength: 100}, description: {type: string, minLength: 20, maxLength: 1024}, type: {type: string, enum: [apartment, house, room, hotel]}, price: {type: integer, minimum: 100, maximum: 100000}, city: {type: object, properties: {name: {type: string, enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]}, location: {type: object, properties: {latitude: {type: number}, longitude: {type: number}, zoom: {type: integer}}}}}, location: {type: object, properties: {latitude: {type: number}, longitude: {type: number}}}, isFavorite: {type: boolean}, isPremium: {type: boolean}, rating: {type: number, minimum: 1, maximum: 5}, previewImage: {type: string}, photos: {type: array, items: {type: string}}, rooms: {type: integer, minimum: 1, maximum: 8}, guests: {type: integer, minimum: 1, maximum: 10}, features: {type: array, items: {type: string, enum: [Breakfast, 'Air conditioning', 'Laptop friendly workspace', 'Baby seat', Washer, Towels, Fridge]}}, author: {type: object, properties: {id: {type: string}, username: {type: string}, avatarUrl: {type: string}, isPro: {type: boolean}}}}}, Review: {type: object, properties: {id: {type: string}, comment: {type: string, minLength: 5, maxLength: 1024}, rating: {type: integer, minimum: 1, maximum: 5}, date: {type: string, format: date-time}, user: {type: object, properties: {name: {type: string}, avatarUrl: {type: string}, isPro: {type: boolean}}}}}, Error: {type: object, properties: {message: {type: string}}}}
tags:
    - {name: Users, description: 'Операции с пользователями'}
    - {name: Offers, description: 'Операции с предложениями'}
    - {name: Reviews, description: 'Операции с отзывами'}
paths:
    /register: {post: {summary: 'Регистрация нового пользователя', tags: [Users], requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [email, password, username], properties: {email: {type: string, format: email}, password: {type: string, minLength: 6, maxLength: 12}, username: {type: string, minLength: 1, maxLength: 15}, userType: {type: string, enum: [normal, pro]}, avatar: {type: string, format: binary}}}, example: {email: Kaitlyn_Jacobson-Bogan54@hotmail.com, password: 5IcnsAHbRs, username: Norene, userType: pro}}}}, responses: {'200': {description: 'Успешная регистрация', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '400': {description: 'Ошибка валидации', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /login: {post: {summary: 'Авторизация пользователя', tags: [Users], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [email, password], properties: {email: {type: string, format: email}, password: {type: string}}}, example: {email: Jenna.Kling36@gmail.com, password: bqabihLaoL}}}}, responses: {'200': {description: 'Успешный логин, возвращает токен', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '400': {description: 'Неверные учётные данные', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, get: {summary: 'Проверка авторизации', tags: [Users], security: [{bearerAuth: []}], responses: {'200': {description: 'Пользователь авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /logout: {delete: {summary: 'Выход из системы', tags: [Users], security: [{bearerAuth: []}], responses: {'200': {description: 'Успешный выход', content: {application/json: {schema: {type: object, properties: {message: {type: string}}}}}}}}}
    /offers: {get: {summary: 'Получить список всех предложений', tags: [Offers], responses: {'200': {description: 'Список предложений', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Offer'}}}}}, '500': {description: 'Ошибка сервера', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, post: {summary: 'Создание нового предложения', tags: [Offers], security: [{bearerAuth: []}], requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [title, description, city, price, rooms, guests, previewImage], properties: {title: {type: string, minLength: 10, maxLength: 100}, description: {type: string, minLength: 20, maxLength: 1024}, publishDate: {type: string, format: date}, city: {type: string, enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]}, isPremium: {type: boolean}, isFavorite: {type: boolean}, rating: {type: number, minimum: 1, maximum: 5}, type: {type: string, enum: [apartment, house, room, hotel]}, rooms: {type: integer, minimum: 1, maximum: 8}, guests: {type: integer, minimum: 1, maximum: 10}, price: {type: integer, minimum: 100, maximum: 100000}, features: {type: string, description: 'JSON-строка массива удобств'}, commentsCount: {type: integer}, latitude: {type: number}, longitude: {type: number}, userId: {type: integer}, previewImage: {type: string, format: binary, description: 'Основное изображение (обязательно)'}, photos: {type: array, items: {type: string, format: binary}, description: 'Дополнительные изображения (макс. 6)'}}}, example: {title: 'antea bis vinitor', description: 'Veritas vallum vulariter tendo trucido nihil paulatim. Nobis valeo textor theatrum carpo praesentium torrens somnus. Uberrime abduco labore.', publishDate: '2026-03-24', city: Dusseldorf, isPremium: false, isFavorite: false, rating: 2.3, type: house, rooms: 5, guests: 2, price: 215, features: '["Breakfast","Air conditioning","Washer","Towels","Fridge"]', commentsCount: 39, latitude: 49.4591, longitude: 4.4287, userId: 8}}}}, responses: {'201': {description: 'Предложение успешно создано', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '400': {description: 'Ошибка валидации данных', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/offers/{id}': {get: {summary: 'Получить полное предложение по ID', tags: [Offers], parameters: [{in: path, name: id, required: true, schema: {type: string}, description: 'ID предложения'}], responses: {'200': {description: 'Информация о предложении', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '404': {description: 'Предложение не найдено', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    /favorite: {get: {summary: 'Получить избранные предложения', tags: [Offers], security: [{bearerAuth: []}], responses: {'200': {description: 'Список избранных предложений', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Offer'}}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/favorite/{offerId}/{status}': {post: {summary: 'Добавить/удалить предложение из избранного', tags: [Offers], security: [{bearerAuth: []}], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}, {in: path, name: status, required: true, schema: {type: string, enum: ['0', '1']}, description: '1 - добавить, 0 - удалить'}], responses: {'200': {description: 'Статус обновлён', content: {application/json: {schema: {$ref: '#/components/schemas/Offer'}}}}, '401': {description: 'Не авторизован', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}, '404': {description: 'Предложение не найдено', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}}
    '/comments/{offerId}': {get: {summary: 'Получить отзывы для предложения', tags: [Reviews], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}], responses: {'200': {description: 'Список отзывов', content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Review'}}}}}, '500': {description: 'Ошибка сервера', content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}}}, post: {summary: 'Добавить отзыв к предложению', tags: [Reviews], security: [{bearerAuth: []}], parameters: [{in: path, name: offerId, required: true, schema: {type: string}, description: 'ID предложения'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [comment, rating], properties: {comment: {type: string, minLength: 5, maxLength: 1024}, rating: {type: integer, minimum: 1, maximum: 5}}}, example: {comment: 'Maiores quis abscido arma urbanus arbor decens cribro cognomen utrimque. Statim una suggero. Crastinus amo cum quasi cum xiphias tergeo vita vinitor. Id approbo contigo crudelis cumque tertius. Tepesco cetera apostolus vesica pecto solio pectus spoliatio. Ullam surculus talis caterva voluptatum vado cresco carmen. Acies taceo universe teres. Molestiae tondeo quos creta turpis vita. Aspicio via blandior comis. Aegre testimonium colo repudiandae custodia praesentium fugit aiunt. Conturbo cognatus patior amet. Textilis venustas appositus voluptatem velum attonbitus nostrum vorago decet. Synagoga tutamen quo ex cunae. Tristis similique subvenio asporto autem. Civis usitas suadeo decumbo depereo speciosus ter caute. Pecus recusandae ademptio congregatio censura. Acquiro beatus supplanto suppono temeritas ultra torqueo suus teneo. Tardus thymum adicio ab suasoria voluptatem. Terror tantum conicio coma cogito cenaculum video. Cubicularis concedo esse adeo dens. Video ara virtus ipsa sophismata caveo eveniet temeritas desino. Aequitas antiquus terreo desol